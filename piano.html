<body data-page="piano">
<header id="site-header"></header>

<main id="piano-page">
  <section class="piano-hero">
    <div class="container">
      <span class="eyebrow" data-reveal style="justify-content:center;display:flex">Play by touch</span>
      <h1 class="display" data-reveal data-delay="1" style="margin:.6rem 0 .4rem"><span class="text-grad">Online Piano</span></h1>
      <p class="lead" data-reveal data-delay="2" style="margin-inline:auto">Use your computer keyboard: the <b>home row</b> (A S D F G H J K L) plays the natural notes, the <b>top row</b> (W E T Y U O P) plays the sharps. Or click the keys.</p>
    </div>
  </section>

  <div class="piano-studio" id="piano-studio">
    <div class="piano-toolbar" id="piano-toolbar">
      <div class="ctrl"><label>Sound</label><select class="voice-sel" id="piano-voice" aria-label="Instrument sound"></select></div>
      <div class="ctrl octave-ctrl">
        <label>Octave</label>
        <div class="oct-stepper">
          <button type="button" id="oct-down" aria-label="Octave down (Z key)"><span class="oct-glyph">−</span><kbd>Z</kbd></button>
          <span id="oct-label">4</span>
          <button type="button" id="oct-up" aria-label="Octave up (X key)"><span class="oct-glyph">+</span><kbd>X</kbd></button>
        </div>
      </div>
      <div class="ctrl"><label>Volume</label><input type="range" id="piano-vol" min="0" max="1" step="0.01" value="0.8" aria-label="Volume"></div>
      <div class="ctrl metro-ctrl">
        <label>Metronome</label>
        <button type="button" class="btn btn-ghost metro-btn" id="metro-toggle" aria-pressed="false">Off</button>
        <input type="range" id="metro-bpm" min="40" max="220" step="1" value="100" aria-label="Tempo BPM">
        <span class="metro-bpm-val" id="metro-bpm-val">100</span>
      </div>
      <button type="button" class="btn btn-ghost" id="labels-toggle" aria-pressed="true">Key hints: on</button>
      <div class="ctrl rec-ctrl">
        <button type="button" class="btn btn-ghost rec-btn" id="piano-rec"><span class="rec-dot"></span><span class="rec-txt">Record</span></button>
        <button type="button" class="btn btn-ghost" id="piano-play" disabled>▶ Play</button>
        <button type="button" class="btn btn-ghost" id="piano-wav" disabled>↓ WAV</button>
        <button type="button" class="btn btn-ghost" id="piano-midi" disabled>↓ MIDI</button>
      </div>
    </div>

    <div class="piano-stage" id="piano-stage">
      <div class="piano-scroll" id="piano-scroll"></div>
    </div>

    <div class="piano-legend" id="piano-legend"></div>
  </div>
</main>
