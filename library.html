<body data-page="library">
<header id="site-header"></header>

<main>
  <section class="page-hero">
    <div class="container">
      <span class="eyebrow" data-reveal style="justify-content:center;display:flex">The full collection</span>
      <h1 class="display" data-reveal data-delay="1" style="margin:1rem 0">The <span class="text-grad">Library</span></h1>
      <p class="lead" data-reveal data-delay="2">Every piece is playable in-browser. Filter by level or mood, search by name, then open one and press play.</p>
    </div>
  </section>

  <section class="section-sm" id="new">
    <div class="container">
      <!-- toolbar -->
      <div class="card lib-toolbar" data-reveal>
        <div class="lib-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-mute)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="lib-search" class="field" placeholder="Search pieces, composers, moods…">
        </div>
        <div class="lib-composer-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <select id="lib-composer" class="field lib-composer" aria-label="Filter by composer">
            <option value="">All composers</option>
          </select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="lib-composer-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><path d="M3 6h13M3 12h9M3 18h5M17 8v11M14 16l3 3 3-3"/></svg>
          <select id="lib-sort" class="field lib-composer" aria-label="Sort pieces">
            <option value="">Sort: Featured</option>
            <option value="year">Oldest first (by era)</option>
            <option value="year-desc">Newest first</option>
            <option value="title">Title A–Z</option>
          </select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="lib-composer-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <select id="lib-era" class="field lib-composer" aria-label="Filter by period">
            <option value="">All periods</option>
          </select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-mute);pointer-events:none"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div class="lib-tier" role="group" aria-label="Composer depth">
          <span class="lib-tier-label">Browse composers</span>
          <button type="button" class="chip tier-btn" data-tier="all">All composers</button>
          <button type="button" class="chip tier-btn" data-tier="deep">Deep catalogues</button>
          <button type="button" class="chip tier-btn" data-tier="rare">Rarely-heard</button>
        </div>
        <div class="lib-chips">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip fav-filter" data-filter="favorites">♥ Favourites</button>
          <button class="chip diff-easy" data-filter="easy">Easy</button>
          <button class="chip diff-medium" data-filter="medium">Medium</button>
          <button class="chip diff-hard" data-filter="hard">Hard</button>
          <button class="chip" data-filter="baroque">Baroque</button>
          <button class="chip" data-filter="classical">Classical</button>
          <button class="chip" data-filter="romantic">Romantic</button>
          <button class="chip" data-filter="impressionist">Impressionist</button>
          <button class="chip" data-filter="opera">Opera</button>
          <button class="chip" data-filter="ragtime">Ragtime</button>
          <button class="chip" data-filter="sacred">Sacred</button>
          <button class="chip" data-filter="folk">Folk</button>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;gap:16px;flex-wrap:wrap">
        <span id="lib-count" class="text-mute" style="font-family:var(--font-mono);font-size:.8rem;letter-spacing:.1em"></span>
        <span class="text-mute" style="font-family:var(--font-mono);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase">Press play on any card’s page</span>
      </div>

      <div class="song-grid" id="library-grid"></div>

      <div id="lib-more-wrap" style="text-align:center;margin-top:40px;display:none">
        <button id="lib-more" class="btn btn-ghost">Load more pieces</button>
      </div>
    </div>
  </section>

  <div class="container">
    <div class="ad-label">Advertisement</div>
    <div class="ad-slot ad-leaderboard" data-ad="leaderboard">Ad space — 970×250 · paste your AdSense unit here</div>
  </div>
